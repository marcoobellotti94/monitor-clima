<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localidade — ibel Monitor Climático</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --marrom:#3d1a0f;--marrom-med:#5c2d1a;
  --verde:#7ac143;--verde-med:#5d9a2e;--verde-escuro:#3d6b1a;
  --laranja:#e8621a;--bege:#c9b89a;--bege-claro:#f5f0e8;--bege-suave:#faf8f4;
  --bg:#ffffff;--border:#e8ddd0;--border2:#d4c4b0;
  --text:#2a1508;--muted:#7a5c48;--muted2:#a88c78;
  --chuva:#1a6ea8;--tmax:#c0392b;--tmin:#1a6ea8;
  --umid:#7b5ea7;--vento:#d4730a;
  --ok-c:#3d6b1a;--at-c:#a0600a;--stop-c:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;}

header{
  background:var(--marrom);padding:0 2.5rem;
  display:flex;align-items:center;gap:1.5rem;
  height:58px;position:sticky;top:0;z-index:10;
}
.back{color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.8rem;transition:color 0.15s;}
.back:hover{color:#fff;}
.logo-ibel{font-size:0.95rem;font-weight:600;color:rgba(255,255,255,0.7);}
.logo-ibel em{color:var(--verde);font-style:normal;}
#loc-header{margin-left:auto;text-align:right;}
#loc-nome{font-family:'DM Serif Display',serif;font-size:1rem;color:#fff;}
#loc-uf{font-size:0.65rem;color:rgba(255,255,255,0.5);}

main{max-width:1100px;margin:0 auto;padding:2rem 2.5rem 5rem;}

/* abas */
.abas{display:flex;border-bottom:2px solid var(--border);margin-bottom:2rem;}
.aba{padding:0.65rem 1.5rem;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted2);transition:all 0.15s;}
.aba:hover{color:var(--text);}
.aba.ativa{color:var(--marrom);border-bottom-color:var(--verde);}
.painel{display:none;}.painel.ativo{display:block;}

/* chips */
.fonte-row{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1.5rem;}
.fchip{font-size:0.62rem;letter-spacing:0.06em;padding:0.12rem 0.48rem;border-radius:3px;border:1px solid var(--border2);color:var(--muted);}
.fchip.dest{color:var(--marrom);border-color:rgba(61,26,15,0.3);background:var(--bege-suave);}
.fchip.inmet{color:var(--verde-escuro);border-color:rgba(61,107,26,0.3);background:rgba(122,193,67,0.06);}

/* zona de confiança */
.confianca{display:flex;border-radius:6px;overflow:hidden;margin-bottom:1.5rem;border:1px solid var(--border);}
.conf-zona{padding:0.6rem 0.9rem;display:flex;flex-direction:column;gap:0.2rem;}
.conf-zona.alta{flex:3;background:rgba(61,107,26,0.07);border-right:1px solid var(--border);}
.conf-zona.media{flex:4;background:rgba(160,96,10,0.06);border-right:1px solid var(--border);}
.conf-zona.baixa{flex:9;background:var(--bege-suave);}
.conf-label{font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;}
.alta .conf-label{color:var(--ok-c);}
.media .conf-label{color:var(--at-c);}
.baixa .conf-label{color:var(--muted2);}
.conf-dias{font-size:0.75rem;}
.alta .conf-dias{color:var(--verde-escuro);}
.media .conf-dias{color:var(--at-c);}
.baixa .conf-dias{color:var(--muted2);}
.conf-desc{font-size:0.65rem;color:var(--muted2);}

/* gráfico */
.chart-card{background:var(--bege-suave);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
.chart-titulo{font-family:'DM Serif Display',serif;font-size:0.95rem;color:var(--marrom);margin-bottom:0.2rem;}
.chart-sub{font-size:0.7rem;color:var(--muted2);margin-bottom:1rem;}

/* semáforo */
.sem-wrap{margin-bottom:1.5rem;}
.sem-titulo{font-family:'DM Serif Display',serif;font-size:0.95rem;color:var(--marrom);margin-bottom:0.5rem;}
.sem-legenda{display:flex;gap:1.25rem;margin-bottom:0.75rem;flex-wrap:wrap;}
.sl-item{display:flex;align-items:center;gap:0.4rem;font-size:0.67rem;color:var(--muted);}
.sl-dot{width:7px;height:7px;border-radius:50%;}
.semaforo-row{display:flex;flex-wrap:wrap;gap:0.4rem;}
.sem-dia{display:flex;flex-direction:column;align-items:center;gap:0.22rem;padding:0.5rem 0.55rem;border-radius:7px;border:1px solid var(--border);background:var(--bege-suave);min-width:60px;}
.sem-dia.ok  {border-color:rgba(61,107,26,0.25);background:rgba(122,193,67,0.06);}
.sem-dia.at  {border-color:rgba(160,96,10,0.25);background:rgba(160,96,10,0.06);}
.sem-dia.stop{border-color:rgba(192,57,43,0.25);background:rgba(192,57,43,0.06);}
.sem-dia.dim {opacity:0.5;}
.sem-dot{width:8px;height:8px;border-radius:50%;}
.ok .sem-dot{background:var(--ok-c);}.at .sem-dot{background:var(--at-c);}.stop .sem-dot{background:var(--stop-c);}
.dim .sem-dot{background:var(--muted2);}
.sem-data{font-size:0.6rem;color:var(--muted2);text-align:center;}
.sem-mm{font-size:0.72rem;font-weight:500;}
.ok .sem-mm{color:var(--ok-c);}.at .sem-mm{color:var(--at-c);}.stop .sem-mm{color:var(--stop-c);}
.dim .sem-mm{color:var(--muted2);}
.sem-txt{font-size:0.58rem;text-align:center;}
.ok .sem-txt{color:var(--ok-c);}.at .sem-txt{color:var(--at-c);}.stop .sem-txt{color:var(--stop-c);}
.dim .sem-txt{color:var(--muted2);}
.conf-pct{font-size:0.58rem;color:var(--muted2);}

/* tabela */
.tabela-card{background:var(--bege-suave);border:1px solid var(--border);border-radius:10px;overflow:auto;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;font-size:0.76rem;}
th{text-align:left;padding:0.6rem 0.9rem;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);font-weight:400;}
td{padding:0.5rem 0.9rem;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,0,0,0.02);}
.tc{color:var(--chuva);font-weight:500;}.tx{color:var(--tmax);}.tn{color:var(--chuva);}
.brow{display:flex;align-items:center;gap:0.5rem;}
.bbg{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;min-width:40px;}
.bfill{height:100%;background:var(--chuva);border-radius:2px;}

/* resumo cards */
.resumo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem;}
@media(max-width:640px){.resumo-grid{grid-template-columns:1fr;}}
.rcard{background:var(--bege-suave);padding:1.25rem 1.4rem;}
.rcard-titulo{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:1rem;}
.rm{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.45rem;}
.rm:last-child{margin-bottom:0;}
.rm-l{font-size:0.72rem;color:var(--muted);}
.rm-v{font-size:0.88rem;font-weight:500;}
.rm-v.c{color:var(--chuva);}.rm-v.x{color:var(--tmax);}.rm-v.n{color:var(--chuva);}
.rm-v.u{color:var(--umid);}.rm-v.w{color:var(--vento);}
.rm-v.d{color:var(--stop-c);}

.aviso{font-size:0.8rem;color:var(--at-c);padding:0.9rem 1rem;background:rgba(160,96,10,0.06);border:1px solid rgba(160,96,10,0.2);border-radius:7px;margin-bottom:1rem;}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">← Voltar</a>
  <div class="logo-ibel"><em>ibel</em> monitor climático</div>
  <div id="loc-header">
    <div id="loc-nome">—</div>
    <div id="loc-uf"></div>
  </div>
</header>

<main id="main"><div style="color:var(--muted2);padding:2rem 0;font-size:0.82rem;">Carregando...</div></main>

<script>
const LOC_ID = new URLSearchParams(location.search).get('id');
const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const semDias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const fmt=(v,s='',d=1)=>v!=null&&isFinite(+v)?(+v).toFixed(d)+s:'—';
const fmtD=s=>{if(!s)return'—';const[,m,d]=s.split('-');return`${+d} ${meses[+m-1]}`;};
const fmtSD=s=>{if(!s)return'';return semDias[new Date(s+'T12:00:00').getDay()];};
const tryFetch=async u=>{try{const r=await fetch(u);return r.ok?r.json():null;}catch{return null;}};

Chart.defaults.color='#a88c78';
Chart.defaults.borderColor='rgba(0,0,0,0.06)';
Chart.defaults.font.family="'DM Sans',sans-serif";
Chart.defaults.font.size=11;

function classCampo(mm){if(mm==null)return'nd';if(mm>=20)return'stop';if(mm>=10)return'at';return'ok';}
function txtCampo(mm){if(mm==null)return'—';if(mm>=20)return'Pausa';if(mm>=10)return'Atenção';return'OK';}

function graficoCombo(id,labels,chuvas,tmax,tmin){
  return new Chart(document.getElementById(id),{
    data:{labels,datasets:[
      {type:'bar',label:'Chuva (mm)',data:chuvas,backgroundColor:'rgba(26,110,168,0.3)',borderColor:'rgba(26,110,168,0.6)',borderWidth:1,yAxisID:'y1',order:2},
      {type:'line',label:'Temp. máx. (°C)',data:tmax,borderColor:'#c0392b',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4,yAxisID:'y2',order:1},
      {type:'line',label:'Temp. mín. (°C)',data:tmin,borderColor:'#1a6ea8',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4,yAxisID:'y2',order:1},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14,color:'#a88c78'}}},
      scales:{
        y1:{position:'left',title:{display:true,text:'Chuva (mm)',color:'#a88c78'},grid:{color:'rgba(0,0,0,0.05)'}},
        y2:{position:'right',title:{display:true,text:'°C',color:'#a88c78'},grid:{display:false}},
        x:{grid:{color:'rgba(0,0,0,0.05)'}},
      }}
  });
}

function graficoUmVento(id,labels,umid,vento){
  return new Chart(document.getElementById(id),{
    data:{labels,datasets:[
      {type:'line',label:'Umidade média (%)',data:umid,borderColor:'#7b5ea7',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4,yAxisID:'y1'},
      {type:'bar',label:'Vento máx. (km/h)',data:vento,backgroundColor:'rgba(212,115,10,0.3)',borderColor:'rgba(212,115,10,0.6)',borderWidth:1,yAxisID:'y2'},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14,color:'#a88c78'}}},
      scales:{
        y1:{position:'left',title:{display:true,text:'Umidade (%)',color:'#a88c78'},grid:{color:'rgba(0,0,0,0.05)'}},
        y2:{position:'right',title:{display:true,text:'Vento (km/h)',color:'#a88c78'},grid:{display:false}},
        x:{grid:{color:'rgba(0,0,0,0.05)'}},
      }}
  });
}

function rmCard(titulo,d){
  if(!d) return`<div class="rcard"><div class="rcard-titulo">${titulo}</div><div style="color:var(--muted2);font-size:0.75rem;">sem dados</div></div>`;
  return`<div class="rcard">
    <div class="rcard-titulo">${titulo}</div>
    <div class="rm"><span class="rm-l">Chuva total</span><span class="rm-v c">${fmt(d.chuva_total_mm,' mm')}</span></div>
    <div class="rm"><span class="rm-l">Dias com chuva</span><span class="rm-v c">${d.dias_com_chuva??'—'}</span></div>
    <div class="rm"><span class="rm-l">Eventos &gt;20mm</span><span class="rm-v d">${d.dias_chuva_intensa??'—'}</span></div>
    <div class="rm"><span class="rm-l">% chuva concentrada</span><span class="rm-v" style="color:var(--at-c)">${d.pct_chuva_concentrada!=null?d.pct_chuva_concentrada+'%':'—'}</span></div>
    <div class="rm"><span class="rm-l">Temp. máx.</span><span class="rm-v x">${fmt(d.temp_max_periodo_c,' °C')}</span></div>
    <div class="rm"><span class="rm-l">Temp. mín.</span><span class="rm-v n">${fmt(d.temp_min_periodo_c,' °C')}</span></div>
    <div class="rm"><span class="rm-l">Umidade média</span><span class="rm-v u">${fmt(d.umidade_media_pct,'%',0)}</span></div>
    <div class="rm"><span class="rm-l">Vento máx.</span><span class="rm-v w">${fmt(d.vento_max_kmh,' km/h',0)}</span></div>
  </div>`;
}


function renderConvergencia(modelos) {
  const conv = modelos?.convergencia;
  if (!conv || conv.length === 0) return '';

  const nomes = modelos?.modelos || {};
  const modeloIds = Object.keys(modelos?.dias_por_modelo || {});
  if (modeloIds.length < 2) return '';

  const linhas = conv.slice(0, 10).map(dia => {
    if (!dia.valores) return '';
    const cls = dia.nivel === 'boa' ? 'conv-boa' : dia.nivel === 'moderada' ? 'conv-mod' : 'conv-baixa';
    const icone = dia.nivel === 'boa' ? '●●●●' : dia.nivel === 'moderada' ? '●●●○' : '●●○○';
    const corIcone = dia.nivel === 'boa' ? 'var(--ok-c)' : dia.nivel === 'moderada' ? 'var(--at-c)' : 'var(--stop-c)';
    const vals = modeloIds.map(mid => {
      const v = dia.valores[mid];
      return `<td style="text-align:right;font-size:0.75rem;">${v!=null?v.toFixed(1):'—'}</td>`;
    }).join('');
    return `<tr>
      <td>${fmtD(dia.data)}</td>
      ${vals}
      <td style="text-align:right;color:var(--muted2);font-size:0.75rem;">${dia.media_mm!=null?dia.media_mm.toFixed(1):'—'}</td>
      <td style="text-align:right;color:var(--muted2);font-size:0.75rem;">±${dia.desvio_mm!=null?dia.desvio_mm.toFixed(1):'—'}</td>
      <td style="text-align:right;font-size:0.68rem;color:${corIcone};">${icone}</td>
    </tr>`;
  }).join('');

  const cabecalhos = modeloIds.map(mid => {
    const n = nomes[mid]?.nome || mid;
    return `<th style="text-align:right">${n}</th>`;
  }).join('');

  return `
    <div class="chart-card" style="margin-bottom:1.5rem;">
      <div class="chart-titulo">Convergência entre modelos — chuva prevista (mm)</div>
      <div class="chart-sub">Quando os modelos concordam, a previsão é mais confiável. Alta divergência = aguardar atualização.</div>
      <div style="overflow:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:0.75rem;">
          <thead>
            <tr>
              <th style="text-align:left;padding:0.5rem 0.6rem;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);">Data</th>
              ${cabecalhos}
              <th style="text-align:right;padding:0.5rem 0.6rem;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);">Média</th>
              <th style="text-align:right;padding:0.5rem 0.6rem;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);">Variação</th>
              <th style="text-align:right;padding:0.5rem 0.6rem;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);">Confiança</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
      <div style="margin-top:0.75rem;display:flex;gap:1.25rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:var(--muted);">
          <span style="color:var(--ok-c)">●●●●</span> Alta — modelos convergem (variação &lt;5mm)
        </div>
        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:var(--muted);">
          <span style="color:var(--at-c)">●●●○</span> Moderada — variação 5–15mm
        </div>
        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:var(--muted);">
          <span style="color:var(--stop-c)">●●○○</span> Baixa — modelos divergem (&gt;15mm), aguardar
        </div>
      </div>
    </div>
  `;
}

async function init(){
  if(!LOC_ID){document.getElementById('main').innerHTML='<div class="aviso">Parâmetro ausente.</div>';return;}
  const base=`data/${LOC_ID}`;
  const [prevOM,prevCT,histERA5,histINMET,resumos,idx]=await Promise.all([
    tryFetch(`${base}/previsao_openmeteo.json`),
    tryFetch(`${base}/previsao_climatempo.json`),
    tryFetch(`${base}/historico_era5.json`),
    tryFetch(`${base}/historico_inmet.json`),
    tryFetch(`${base}/resumos.json`),
    tryFetch('data/index.json'),
  ]);
  const locInfo=idx?.localidades?.find(l=>l.id===LOC_ID);
  document.getElementById('loc-nome').textContent=locInfo?.nome||LOC_ID;
  document.getElementById('loc-uf').textContent=locInfo?.estado||'';
  document.title=`${locInfo?.nome||LOC_ID} — ibel Monitor Climático`;

  document.getElementById('main').innerHTML=`
    <div class="abas">
      <div class="aba ativa" data-aba="previsao">Previsão</div>
      <div class="aba" data-aba="historico">Histórico</div>
    </div>
    <div id="painel-previsao" class="painel ativo"></div>
    <div id="painel-historico" class="painel"></div>
  `;

  document.querySelectorAll('.aba').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.aba').forEach(x=>x.classList.remove('ativa'));
    document.querySelectorAll('.painel').forEach(x=>x.classList.remove('ativo'));
    b.classList.add('ativa');
    document.getElementById('painel-'+b.dataset.aba).classList.add('ativo');
  }));

  renderPrevisao(prevOM,prevCT,locInfo);
  renderHistorico(histERA5,histINMET,resumos,locInfo);
}

async function renderPrevisao(om,ct,locInfo){
  // Carrega dados de convergência de modelos
  const modelos = await tryFetch(`data/${LOC_ID}/modelos_comparacao.json`);

  const el=document.getElementById('painel-previsao');
  if(!om){el.innerHTML='<div class="aviso">Dados de previsão não disponíveis. Execute o robô de coleta.</div>';return;}
  const dias=om.dias.slice(0,16);
  const maxChuva=Math.max(...dias.map(d=>d.chuva_mm||0),1);
  const labels=dias.map(d=>fmtD(d.data));
  const chuvas=dias.map(d=>d.chuva_mm||0);
  const tmax=dias.map(d=>d.temp_max_c);
  const tmin=dias.map(d=>d.temp_min_c);

  const fontes=[`<span class="fchip dest">Open-Meteo</span>`];
  if(ct) fontes.push(`<span class="fchip">Climatempo</span>`);
  if(locInfo?.estacao_inmet) fontes.push(`<span class="fchip inmet">INMET ${locInfo.estacao_inmet}</span>`);

  // Semáforo com confiança (bolinhas)
  const sem7=dias.slice(0,7).map((d,i)=>{
    const mm=d.chuva_mm||0;
    const cls=classCampo(mm);
    // Confiança decresce com dias: 1-2=alta, 3-4=média, 5-7=baixa
    const confianca=i<2?'alta':i<4?'media':'baixa';
    const conf=confianca==='alta'?'●●●●':confianca==='media'?'●●●○':'●●○○';
    return`<div class="sem-dia ${cls}${i>=5?' dim':''}">
      <div class="sem-dot"></div>
      <div class="sem-data">${fmtSD(d.data)}<br>${fmtD(d.data)}</div>
      <div class="sem-mm">${mm.toFixed(1)} mm</div>
      <div class="sem-txt">${txtCampo(mm)}</div>
      <div class="conf-pct">${conf}</div>
    </div>`;
  }).join('');

  const linhas=dias.map((d,i)=>{
    const ctd=ct?.dias?.[i];
    const prob=d.prob_chuva_pct??ctd?.prob_chuva_pct;
    const pct=(d.chuva_mm||0)/maxChuva*100;
    const dim=i>=7?'style="opacity:0.5"':'';
    return`<tr ${dim}>
      <td>${fmtSD(d.data)}</td>
      <td>${fmtD(d.data)}</td>
      <td><div class="brow"><span class="tc">${fmt(d.chuva_mm,' mm')}</span><div class="bbg"><div class="bfill" style="width:${pct}%"></div></div></div></td>
      <td>${prob!=null?prob+'%':'—'}</td>
      <td class="tx">${fmt(d.temp_max_c,'°')}</td>
      <td class="tn">${fmt(d.temp_min_c,'°')}</td>
      <td>${fmt(d.umidade_max_pct,'%',0)}</td>
      <td>${fmt(d.vento_max_kmh,' km/h',0)}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="fonte-row">${fontes.join('')}</div>

    <div class="confianca">
      <div class="conf-zona alta"><div class="conf-label">Alta confiança</div><div class="conf-dias">Dias 1–3</div><div class="conf-desc">Decisões imediatas</div></div>
      <div class="conf-zona media"><div class="conf-label">Moderada</div><div class="conf-dias">Dias 4–7</div><div class="conf-desc">Planejamento semanal</div></div>
      <div class="conf-zona baixa"><div class="conf-label">Tendência apenas</div><div class="conf-dias">Dias 8–16</div><div class="conf-desc">Não usar operacionalmente</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Chuva e temperatura — próximos 16 dias</div>
      <div class="chart-sub">Barras: precipitação (mm) · Linhas: temperatura máxima e mínima (°C) · Dias 8–16 com confiança reduzida</div>
      <canvas id="chart-prev" height="90"></canvas>
    </div>

    <div class="sem-wrap">
      <div class="sem-titulo">Condições para trabalho em campo — próximos 7 dias</div>
      <div class="sem-legenda">
        <div class="sl-item"><div class="sl-dot" style="background:var(--ok-c)"></div>Favorável (&lt;10mm)</div>
        <div class="sl-item"><div class="sl-dot" style="background:var(--at-c)"></div>Atenção (10–20mm)</div>
        <div class="sl-item"><div class="sl-dot" style="background:var(--stop-c)"></div>Pausa (&gt;20mm)</div>
        <div class="sl-item" style="color:var(--muted2)">●●●● alta confiança · ●●○○ baixa confiança</div>
      </div>
      <div class="semaforo-row">${sem7}</div>
    </div>


    ${modelos ? renderConvergencia(modelos) : ''}

    <div class="tabela-card">
      <div style="padding:1rem 1.25rem 0.5rem;font-family:'DM Serif Display',serif;font-size:0.9rem;color:var(--marrom);">Detalhamento diário</div>
      <div style="overflow:auto;">
        <table>
          <thead><tr><th></th><th>Data</th><th>Chuva</th><th>Prob.</th><th>Máx.</th><th>Mín.</th><th>Umid.</th><th>Vento</th></tr></thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
    </div>
  `;
  graficoCombo('chart-prev',labels,chuvas,tmax,tmin);
}

function renderHistorico(era5,inmet,resumos,locInfo){
  const el=document.getElementById('painel-historico');
  const fonte=inmet||era5;
  if(!fonte){el.innerHTML='<div class="aviso">Dados históricos não disponíveis. Execute o robô de coleta.</div>';return;}

  const dias=fonte.dias;
  const labels=dias.map(d=>fmtD(d.data));
  const chuvas=dias.map(d=>d.chuva_mm||0);
  const tmax=dias.map(d=>d.temp_max_c);
  const tmin=dias.map(d=>d.temp_min_c);
  const umid=dias.map(d=>((d.umidade_max_pct||0)+(d.umidade_min_pct||0))/2||null);
  const vento=dias.map(d=>d.vento_max_kmh||0);

  const fonteLabel=inmet?`INMET — estação ${inmet.estacao}`:'Open-Meteo / ERA5';
  const fonteCls=inmet?'inmet':'dest';

  el.innerHTML=`
    <div class="fonte-row">
      <span class="fchip ${fonteCls}">${fonteLabel}</span>
      ${!inmet?'<span class="fchip">ERA5 / ECMWF</span>':''}
      <span style="font-size:0.65rem;color:var(--muted2);margin-left:0.3rem;">${fonte.periodo_inicio} → ${fonte.periodo_fim}</span>
    </div>

    <div class="resumo-grid">
      ${rmCard('Última semana — 7 dias',resumos?.ultimos_7_dias)}
      ${rmCard('Últimos 15 dias',resumos?.ultimos_15_dias)}
      ${rmCard('Último mês — 30 dias',resumos?.ultimos_30_dias)}
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Precipitação e temperatura diária</div>
      <div class="chart-sub">Barras: chuva acumulada (mm) · Linhas: temperatura máxima e mínima (°C)</div>
      <canvas id="chart-hist-combo" height="90"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Umidade e vento</div>
      <div class="chart-sub">Umidade média (%) e velocidade máxima do vento (km/h)</div>
      <canvas id="chart-hist-umvento" height="70"></canvas>
    </div>
  `;

  graficoCombo('chart-hist-combo',labels,chuvas,tmax,tmin);
  graficoUmVento('chart-hist-umvento',labels,umid,vento);
}

init();
</script>
</body>
</html>
