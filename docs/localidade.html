<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localidade — Monitor Climático</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --chuva: #58a6ff;
    --chuva-light: rgba(88,166,255,0.15);
    --temp-max: #f78166;
    --temp-min: #79c0ff;
    --verde: #3fb950;
    --amber: #d29922;
    --umidade: #a371f7;
    --vento: #ffa657;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .back {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.15s;
  }
  .back:hover { color: var(--text); }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--muted);
  }
  .logo span { color: var(--chuva); }
  #loc-header {
    margin-left: auto;
    text-align: right;
  }
  #loc-nome {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
  }
  #loc-estado { font-size: 0.75rem; color: var(--muted); }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  /* ABAS */
  .abas {
    display: flex;
    gap: 0.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .aba {
    padding: 0.6rem 1.25rem;
    font-size: 0.875rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    transition: all 0.15s;
    user-select: none;
  }
  .aba:hover { color: var(--text); }
  .aba.ativa {
    color: var(--chuva);
    border-bottom-color: var(--chuva);
  }
  .painel { display: none; }
  .painel.ativo { display: block; }

  /* CARTÕES DE RESUMO */
  .resumo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 640px) { .resumo-grid { grid-template-columns: 1fr; } }

  .resumo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
  }
  .resumo-titulo {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .resumo-metricas { display: flex; flex-direction: column; gap: 0.6rem; }
  .rm { display: flex; justify-content: space-between; align-items: baseline; }
  .rm-label { font-size: 0.8rem; color: var(--muted); }
  .rm-valor { font-size: 0.95rem; font-weight: 500; }
  .rm-valor.chuva { color: var(--chuva); }
  .rm-valor.temp  { color: var(--temp-max); }
  .rm-valor.umid  { color: var(--umidade); }
  .rm-valor.vento { color: var(--vento); }

  /* SEÇÃO DE GRÁFICO */
  .secao {
    margin-bottom: 2.5rem;
  }
  .secao-titulo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
    color: var(--text);
  }
  .secao-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    position: relative;
  }

  /* TABELA DE PREVISÃO */
  .tabela-prev {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .tabela-prev th {
    text-align: left;
    padding: 0.6rem 0.75rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  .tabela-prev td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .tabela-prev tr:last-child td { border-bottom: none; }
  .tabela-prev tr:hover td { background: var(--surface2); }
  .td-chuva { color: var(--chuva) !important; font-weight: 500; }
  .td-temp  { color: var(--temp-max) !important; }
  .td-min   { color: var(--temp-min) !important; }

  /* BARRA DE CHUVA INLINE */
  .barra-wrap { display: flex; align-items: center; gap: 0.5rem; }
  .barra-bg {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    min-width: 60px;
  }
  .barra-fill { height: 100%; background: var(--chuva); border-radius: 2px; }

  /* FONTE BADGE */
  .fonte-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.2rem 0.5rem;
    margin-right: 0.4rem;
  }
  .fonte-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--chuva);
  }
  .fonte-dot.ct { background: var(--amber); }
  .fonte-dot.inmet { background: var(--verde); }

  .loading { color: var(--muted); padding: 2rem 0; }
  .aviso {
    font-size: 0.8rem;
    color: var(--amber);
    padding: 0.75rem 1rem;
    background: rgba(210,153,34,0.1);
    border: 1px solid rgba(210,153,34,0.3);
    border-radius: 6px;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back">← Voltar</a>
  <div class="logo">Monitor<span>Clima</span></div>
  <div id="loc-header">
    <div id="loc-nome">—</div>
    <div id="loc-estado"></div>
  </div>
</header>

<main id="main">
  <div class="loading">Carregando dados da localidade...</div>
</main>

<script>
// Utilitários
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const LOC_ID = params.get('id');

function fmt(v, suf = '', dec = 1) {
  return v != null ? Number(v).toFixed(dec) + suf : '—';
}
function fmtData(s) {
  if (!s) return '—';
  const [y, m, d] = s.split('-');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${d} ${meses[+m-1]}`;
}
function fmtDiaSemana(s) {
  if (!s) return '';
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const d = new Date(s + 'T12:00:00');
  return dias[d.getDay()];
}

// Chart.js defaults
Chart.defaults.color = '#7d8590';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size = 11;

async function tryFetch(url) {
  try {
    const r = await fetch(url);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

// ─── RENDER PRINCIPAL ───
async function init() {
  if (!LOC_ID) {
    document.getElementById('main').innerHTML =
      '<div class="aviso">Parâmetro de localidade não informado. <a href="index.html">Voltar ao início.</a></div>';
    return;
  }

  const base = `data/${LOC_ID}`;
  const [prevOM, prevCT, histERA5, histINMET, resumos, idx] = await Promise.all([
    tryFetch(`${base}/previsao_openmeteo.json`),
    tryFetch(`${base}/previsao_climatempo.json`),
    tryFetch(`${base}/historico_era5.json`),
    tryFetch(`${base}/historico_inmet.json`),
    tryFetch(`${base}/resumos.json`),
    tryFetch('data/index.json'),
  ]);

  // Preenche header
  const locInfo = idx?.localidades?.find(l => l.id === LOC_ID);
  $('loc-nome').textContent = locInfo?.nome || LOC_ID;
  $('loc-estado').textContent = locInfo?.estado || '';
  document.title = `${locInfo?.nome || LOC_ID} — Monitor Climático`;

  // Monta estrutura de abas
  const main = $('main');
  main.innerHTML = `
    <div class="abas">
      <div class="aba ativa" data-aba="previsao">Previsão</div>
      <div class="aba" data-aba="historico">Histórico</div>
    </div>
    <div id="painel-previsao" class="painel ativo"></div>
    <div id="painel-historico" class="painel"></div>
  `;

  // Troca de abas
  document.querySelectorAll('.aba').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.aba').forEach(b => b.classList.remove('ativa'));
      document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
      btn.classList.add('ativa');
      document.getElementById('painel-' + btn.dataset.aba).classList.add('ativo');
    });
  });

  renderPrevisao(prevOM, prevCT);
  renderHistorico(histERA5, histINMET, resumos);
}

// ─── ABA PREVISÃO ───
function renderPrevisao(om, ct) {
  const el = $('painel-previsao');
  if (!om) {
    el.innerHTML = '<div class="aviso">Dados de previsão não disponíveis. Execute o robô de coleta.</div>';
    return;
  }

  const dias = om.dias.slice(0, 16);
  const maxChuva = Math.max(...dias.map(d => d.chuva_mm || 0), 1);

  // Fontes disponíveis
  let fontes = `<div class="fonte-badge"><span class="fonte-dot"></span>Open-Meteo</div>`;
  if (ct) fontes += `<div class="fonte-badge"><span class="fonte-dot ct"></span>Climatempo</div>`;

  // Gráfico chuva + temperatura
  const labels = dias.map(d => fmtData(d.data));
  const chuvas = dias.map(d => d.chuva_mm || 0);
  const tmax   = dias.map(d => d.temp_max_c);
  const tmin   = dias.map(d => d.temp_min_c);

  // Tabela detalhada
  let linhas = '';
  for (let i = 0; i < dias.length; i++) {
    const d = dias[i];
    const ds = fmtDiaSemana(d.data);
    const ctDia = ct?.dias?.[i];
    const probCT = ctDia?.prob_chuva_pct;
    const prob = d.prob_chuva_pct ?? probCT;
    const pct = (d.chuva_mm || 0) / maxChuva * 100;

    linhas += `<tr>
      <td>${ds}</td>
      <td>${fmtData(d.data)}</td>
      <td>
        <div class="barra-wrap">
          <span class="td-chuva">${fmt(d.chuva_mm, ' mm')}</span>
          <div class="barra-bg"><div class="barra-fill" style="width:${pct}%"></div></div>
        </div>
      </td>
      <td>${prob != null ? prob + '%' : '—'}</td>
      <td class="td-temp">${fmt(d.temp_max_c, '°')}</td>
      <td class="td-min">${fmt(d.temp_min_c, '°')}</td>
      <td>${fmt(d.umidade_max_pct, '%', 0)}</td>
      <td>${fmt(d.vento_max_kmh, ' km/h', 0)}</td>
    </tr>`;
  }

  el.innerHTML = `
    <div style="margin-bottom:1.25rem;">${fontes}</div>

    <div class="secao">
      <div class="secao-titulo">Chuva e temperatura — próximos 16 dias</div>
      <div class="secao-sub">Barras: precipitação (mm) · Linhas: temperatura máxima e mínima (°C)</div>
      <div class="chart-wrap">
        <canvas id="chart-prev" height="90"></canvas>
      </div>
    </div>

    <div class="secao">
      <div class="secao-titulo">Detalhamento diário</div>
      <div class="chart-wrap" style="padding:0; overflow:auto;">
        <table class="tabela-prev">
          <thead>
            <tr>
              <th></th>
              <th>Data</th>
              <th>Chuva</th>
              <th>Prob.</th>
              <th>Máx.</th>
              <th>Mín.</th>
              <th>Umid.</th>
              <th>Vento</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
    </div>
  `;

  // Renderiza gráfico
  new Chart($('chart-prev'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Chuva (mm)',
          data: chuvas,
          backgroundColor: 'rgba(88,166,255,0.35)',
          borderColor: 'rgba(88,166,255,0.7)',
          borderWidth: 1,
          yAxisID: 'y1',
          order: 2,
        },
        {
          type: 'line',
          label: 'Temp. máx. (°C)',
          data: tmax,
          borderColor: '#f78166',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.4,
          yAxisID: 'y2',
          order: 1,
        },
        {
          type: 'line',
          label: 'Temp. mín. (°C)',
          data: tmin,
          borderColor: '#79c0ff',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.4,
          yAxisID: 'y2',
          order: 1,
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16 } } },
      scales: {
        y1: { position: 'left', title: { display: true, text: 'Chuva (mm)' }, grid: { color: '#30363d' } },
        y2: { position: 'right', title: { display: true, text: '°C' }, grid: { display: false } },
        x: { grid: { color: '#30363d' } },
      },
    },
  });
}

// ─── ABA HISTÓRICO ───
function renderHistorico(era5, inmet, resumos) {
  const el = $('painel-historico');
  const fonte = inmet || era5;

  if (!fonte) {
    el.innerHTML = '<div class="aviso">Dados históricos não disponíveis. Execute o robô de coleta.</div>';
    return;
  }

  const dias = fonte.dias;
  const labels = dias.map(d => fmtData(d.data));
  const chuvas = dias.map(d => d.chuva_mm || 0);
  const tmax   = dias.map(d => d.temp_max_c);
  const tmin   = dias.map(d => d.temp_min_c);
  const umid   = dias.map(d => ((d.umidade_max_pct || 0) + (d.umidade_min_pct || 0)) / 2);
  const vento  = dias.map(d => d.vento_max_kmh || 0);

  const fonteLabel = inmet ? 'INMET (observado)' : 'ERA5 / Open-Meteo';
  const fonteDot   = inmet ? 'inmet' : '';

  // Cartões de resumo
  function rmCard(titulo, dados) {
    if (!dados) return '<div class="resumo-card"><div class="resumo-titulo">' + titulo + '</div><div style="color:var(--muted);font-size:0.8rem">sem dados</div></div>';
    return `
      <div class="resumo-card">
        <div class="resumo-titulo">${titulo}</div>
        <div class="resumo-metricas">
          <div class="rm">
            <span class="rm-label">Chuva total</span>
            <span class="rm-valor chuva">${fmt(dados.chuva_total_mm, ' mm')}</span>
          </div>
          <div class="rm">
            <span class="rm-label">Dias com chuva</span>
            <span class="rm-valor chuva">${dados.dias_com_chuva ?? '—'}</span>
          </div>
          <div class="rm">
            <span class="rm-label">Temp. máx.</span>
            <span class="rm-valor temp">${fmt(dados.temp_max_periodo_c, ' °C')}</span>
          </div>
          <div class="rm">
            <span class="rm-label">Temp. mín.</span>
            <span class="rm-valor" style="color:var(--temp-min)">${fmt(dados.temp_min_periodo_c, ' °C')}</span>
          </div>
          <div class="rm">
            <span class="rm-label">Umidade média</span>
            <span class="rm-valor umid">${fmt(dados.umidade_media_pct, '%', 0)}</span>
          </div>
          <div class="rm">
            <span class="rm-label">Vento máx.</span>
            <span class="rm-valor vento">${fmt(dados.vento_max_kmh, ' km/h', 0)}</span>
          </div>
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div style="margin-bottom:1.25rem;">
      <div class="fonte-badge"><span class="fonte-dot ${fonteDot}"></span>${fonteLabel}</div>
    </div>

    <div class="resumo-grid">
      ${rmCard('Última semana (7 dias)', resumos?.ultimos_7_dias)}
      ${rmCard('Últimos 15 dias', resumos?.ultimos_15_dias)}
      ${rmCard('Último mês (30 dias)', resumos?.ultimos_30_dias)}
    </div>

    <div class="secao">
      <div class="secao-titulo">Precipitação diária</div>
      <div class="secao-sub">Chuva acumulada por dia nos últimos 35 dias</div>
      <div class="chart-wrap">
        <canvas id="chart-chuva" height="70"></canvas>
      </div>
    </div>

    <div class="secao">
      <div class="secao-titulo">Temperatura</div>
      <div class="secao-sub">Máxima e mínima diária (°C)</div>
      <div class="chart-wrap">
        <canvas id="chart-temp" height="70"></canvas>
      </div>
    </div>

    <div class="secao">
      <div class="secao-titulo">Umidade e vento</div>
      <div class="secao-sub">Umidade média (%) e vento máximo (km/h)</div>
      <div class="chart-wrap">
        <canvas id="chart-umvento" height="70"></canvas>
      </div>
    </div>
  `;

  const baseOpts = {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16 } } },
    scales: {
      x: { grid: { color: '#30363d' } },
    },
  };

  // Chuva
  new Chart($('chart-chuva'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Chuva (mm)',
        data: chuvas,
        backgroundColor: 'rgba(88,166,255,0.45)',
        borderColor: 'rgba(88,166,255,0.8)',
        borderWidth: 1,
      }],
    },
    options: { ...baseOpts, scales: { ...baseOpts.scales, y: { grid: { color: '#30363d' } } } },
  });

  // Temperatura
  new Chart($('chart-temp'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Máxima (°C)', data: tmax, borderColor: '#f78166', backgroundColor: 'rgba(247,129,102,0.1)', fill: false, tension: 0.4, borderWidth: 2, pointRadius: 2 },
        { label: 'Mínima (°C)', data: tmin, borderColor: '#79c0ff', backgroundColor: 'transparent', fill: false, tension: 0.4, borderWidth: 2, pointRadius: 2 },
      ],
    },
    options: { ...baseOpts, scales: { ...baseOpts.scales, y: { grid: { color: '#30363d' } } } },
  });

  // Umidade + Vento
  new Chart($('chart-umvento'), {
    data: {
      labels,
      datasets: [
        { type: 'line', label: 'Umidade média (%)', data: umid, borderColor: '#a371f7', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 2, yAxisID: 'y1' },
        { type: 'bar',  label: 'Vento máx. (km/h)', data: vento, backgroundColor: 'rgba(255,166,87,0.35)', borderColor: 'rgba(255,166,87,0.7)', borderWidth: 1, yAxisID: 'y2' },
      ],
    },
    options: {
      ...baseOpts,
      scales: {
        y1: { position: 'left',  grid: { color: '#30363d' }, title: { display: true, text: 'Umidade (%)' } },
        y2: { position: 'right', grid: { display: false },   title: { display: true, text: 'Vento (km/h)' } },
        x:  { grid: { color: '#30363d' } },
      },
    },
  });
}

init();
</script>
</body>
</html>
