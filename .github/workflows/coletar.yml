name: Coleta Climática Semanal

on:
  schedule:
    # Toda segunda-feira às 06:00 horário de Brasília (09:00 UTC)
    - cron: '0 9 * * 1'

  # Permite disparar manualmente pelo painel do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar robô de coleta
        env:
          CLIMATEMPO_TOKEN: ${{ secrets.CLIMATEMPO_TOKEN }}
        run: python coletar_clima.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "robo-clima[bot]"
          git config user.email "robo-clima@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "dados: atualização semanal $(date -u +%Y-%m-%d)"
          git push
